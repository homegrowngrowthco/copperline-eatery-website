name: Deploy to Netlify

on:
  push:
    branches: [master]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Stamp styles.css / script.js cache-bust query params with content hashes.
      # styles.css and script.js are served immutable (1y cache) per site/_headers,
      # so the URL must change whenever file content changes — otherwise browsers
      # never re-fetch. Hash-based stamping does this automatically: same content =
      # same URL (cache hit), changed content = new URL (forced refresh).
      - name: Stamp asset cache-bust hashes
        run: |
          CSS_HASH=$(sha256sum site/styles.css | cut -c1-8)
          JS_HASH=$(sha256sum site/script.js | cut -c1-8)
          echo "styles.css?v=$CSS_HASH"
          echo "script.js?v=$JS_HASH"
          sed -i -E "s|styles\.css\?v=[a-zA-Z0-9]+|styles.css?v=${CSS_HASH}|g" site/*.html
          sed -i -E "s|script\.js\?v=[a-zA-Z0-9]+|script.js?v=${JS_HASH}|g" site/*.html
          # Sanity check: every HTML file must reference both stamped assets.
          for f in site/*.html; do
            grep -q "styles.css?v=${CSS_HASH}" "$f" || { echo "MISSING styles.css stamp in $f"; exit 1; }
            grep -q "script.js?v=${JS_HASH}"  "$f" || { echo "MISSING script.js stamp in $f"; exit 1; }
          done

      - name: Deploy to Netlify
        uses: nwtgck/actions-netlify@v3
        with:
          publish-dir: ./site
          production-branch: master
          production-deploy: true
          deploy-message: "Deploy from ${{ github.sha }} - ${{ github.event.head_commit.message }}"
          enable-pull-request-comment: false
          enable-commit-comment: false
        env:
          NETLIFY_AUTH_TOKEN: ${{ secrets.NETLIFY_AUTH_TOKEN }}
          NETLIFY_SITE_ID: ${{ secrets.NETLIFY_SITE_ID }}

      - name: Notify IndexNow
        if: success()
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.indexnow.org/indexnow" \
            -H "Content-Type: application/json; charset=utf-8" \
            -d '{
              "host": "copperlineeatery.com",
              "key": "670b4b1e5abe94d9050c77bc3a1011e2",
              "keyLocation": "https://copperlineeatery.com/670b4b1e5abe94d9050c77bc3a1011e2.txt",
              "urlList": [
                "https://copperlineeatery.com/",
                "https://copperlineeatery.com/menu.html",
                "https://copperlineeatery.com/catering.html",
                "https://copperlineeatery.com/contact.html",
                "https://copperlineeatery.com/about.html",
                "https://copperlineeatery.com/faq.html"
              ]
            }')
          echo "IndexNow response: $STATUS"
          if [ "$STATUS" != "200" ] && [ "$STATUS" != "202" ]; then
            echo "Warning: IndexNow returned unexpected status $STATUS"
          fi
